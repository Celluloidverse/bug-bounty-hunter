name: Weekly Template Update
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Install nuclei
        run: go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest

      - name: Update and cache nuclei templates
        uses: actions/cache@v4
        with:
          path: ~/.local/share/nuclei-templates
          key: nuclei-templates-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            nuclei-templates-${{ runner.os }}-

      - name: Run update
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          nuclei -update-templates -silent
