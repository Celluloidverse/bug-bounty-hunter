name: Weekly Template Update
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Cache Go tools
        uses: actions/cache@v4
        id: cache-tools
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-v1

      - name: Install nuclei if not cached
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest

      - name: Run update and save templates
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          nuclei -update-templates -silent || true
          echo "Templates downloaded: $(ls $HOME/.local/share/nuclei-templates | wc -l) folders"

      - name: Cache nuclei templates
        uses: actions/cache@v4
        with:
          path: ~/.local/share/nuclei-templates
          key: nuclei-templates-${{ runner.os }}-weekly
