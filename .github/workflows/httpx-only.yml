name: HTTPX Only
on:
  workflow_dispatch:

jobs:
  httpx_prepare:
    runs-on: ubuntu-latest
    outputs:
      httpx_batches: ${{ steps.split.outputs.httpx_batches }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Split for httpx
        id: split
        run: |
          cat subdomains1.txt subdomains2.txt | \
          grep -v '^\*\.' | \
          grep -vE '^[0-9]{1,3}\.[0-9]' | \
          grep -vE '^[a-f0-9]{32}\.' | \
          sort -u > all_subdomains_clean.txt
          total=$(wc -l < all_subdomains_clean.txt)
          num_batches=$(( (total + 49999) / 50000 ))
          httpx_batches=$(seq 1 $num_batches | jq -R . | jq -sc .)
          echo "httpx_batches=$httpx_batches" >> $GITHUB_OUTPUT
          echo "Total: $total in $num_batches batches"

      - name: Upload clean subdomains
        uses: actions/upload-artifact@v4
        with:
          name: all-subdomains-clean
          path: all_subdomains_clean.txt

  httpx_scan:
    needs: httpx_prepare
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        batch: ${{ fromJson(needs.httpx_prepare.outputs.httpx_batches) }}
    steps:
      - name: Cache Go tools
        uses: actions/cache@v4
        id: cache-tools
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-v1

      - name: Install httpx
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: go install github.com/projectdiscovery/httpx/cmd/httpx@latest

      - name: Download subdomains
        uses: actions/download-artifact@v4
        with:
          name: all-subdomains-clean

      - name: Run httpx on batch
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          start=$(( (${{ matrix.batch }} - 1) * 50000 + 1 ))
          sed -n "${start},$((start + 49999))p" all_subdomains_clean.txt > batch_subs.txt
          httpx -l batch_subs.txt \
            -silent \
            -timeout 5 \
            -retries 0 \
            -rl 300 \
            -threads 100 \
            -o batch_live.txt || true
          echo "Live hosts in batch ${{ matrix.batch }}: $(wc -l < batch_live.txt)"

      - name: Upload live hosts
        uses: actions/upload-artifact@v4
        with:
          name: live-batch-${{ matrix.batch }}
          path: batch_live.txt
          if-no-files-found: warn

  combine_hosts:
    needs: [httpx_prepare, httpx_scan]
    runs-on: ubuntu-latest
    if: ${{ always() && needs.httpx_prepare.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all live host artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_live
          pattern: live-batch-*

      - name: Combine live hosts
        run: |
          find all_live -name "*.txt" | xargs cat 2>/dev/null | \
          sort -u > live_hosts.txt || true
          echo "Total live hosts: $(wc -l < live_hosts.txt)"

      - name: Commit live hosts
        run: |
          git config --global user.email "bugbountybot@github.com"
          git config --global user.name "BugBountyBot"
          git add live_hosts.txt
          git diff --staged --quiet || git commit -m "Weekly live hosts update $(date +'%Y-%m-%d')"
          git push
